services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newscms
      POSTGRES_PASSWORD: newscms_local_dev
      POSTGRES_DB: newscms
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newscms -d newscms"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://newscms:newscms_local_dev@db:5432/newscms
      DB_DIALECT: postgres
      JWT_SECRET: local-dev-secret-change-me
      # ANTHROPIC_API_KEY: sk-ant-xxxxx
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
